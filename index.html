<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puissance 4</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.4rem;
      margin-bottom: 0.3rem;
      letter-spacing: 2px;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1rem;
      height: 2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot.red    { background: #e63946; }
    .dot.yellow { background: #f4d35e; }

    #board {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      background: #16213e;
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .cell {
      width: 70px;
      height: 70px;
      background: #0f3460;
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.15s, transform 0.2s;
      position: relative;
    }

    .cell:hover {
      transform: scale(1.08);
      background: #1a4a7a;
    }

    .cell.red {
      background: #e63946;
      box-shadow: inset 0 -4px 6px rgba(0,0,0,0.3);
    }

    .cell.yellow {
      background: #f4d35e;
      box-shadow: inset 0 -4px 6px rgba(0,0,0,0.2);
    }

    .cell.win {
      animation: pulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.15); }
    }

    .cell.drop {
      animation: drop 0.35s ease-in;
    }

    @keyframes drop {
      from { transform: translateY(-300px); opacity: 0.6; }
      to   { transform: translateY(0); opacity: 1; }
    }

    #restart {
      margin-top: 1.2rem;
      padding: 0.7rem 2rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #e63946;
      color: #fff;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 1px;
      transition: background 0.2s;
    }

    #restart:hover { background: #c1121f; }

    #scoreboard {
      margin-top: 1rem;
      display: flex;
      gap: 2rem;
      font-size: 1.1rem;
    }

    .score-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    @media (max-width: 560px) {
      .cell { width: 44px; height: 44px; }
      #board { gap: 4px; padding: 8px; }
      h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <h1>Puissance 4</h1>
  <div id="status"></div>
  <div id="board"></div>
  <div id="scoreboard">
    <div class="score-item"><span class="dot red"></span> Joueur 1 : <strong id="score1">0</strong></div>
    <div class="score-item"><span class="dot yellow"></span> Joueur 2 : <strong id="score2">0</strong></div>
  </div>
  <button id="restart">Nouvelle partie</button>

  <script>
    const ROWS = 6;
    const COLS = 7;
    const EMPTY = 0;
    const P1 = 1;
    const P2 = 2;

    let board, currentPlayer, gameOver;
    let scores = { 1: 0, 2: 0 };

    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const restartBtn = document.getElementById('restart');

    function init() {
      board = Array.from({ length: ROWS }, () => Array(COLS).fill(EMPTY));
      currentPlayer = P1;
      gameOver = false;
      render();
      updateStatus();
    }

    function colorClass(p) {
      return p === P1 ? 'red' : 'yellow';
    }

    function playerName(p) {
      return p === P1 ? 'Joueur 1' : 'Joueur 2';
    }

    function updateStatus() {
      if (gameOver) return;
      statusEl.innerHTML = `<span class="dot ${colorClass(currentPlayer)}"></span> ${playerName(currentPlayer)}, c'est ton tour !`;
    }

    function render() {
      boardEl.innerHTML = '';
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = document.createElement('div');
          cell.classList.add('cell');
          if (board[r][c] === P1) cell.classList.add('red');
          if (board[r][c] === P2) cell.classList.add('yellow');
          cell.dataset.col = c;
          cell.dataset.row = r;
          cell.addEventListener('click', () => play(c));
          boardEl.appendChild(cell);
        }
      }
    }

    function getCell(r, c) {
      return boardEl.children[r * COLS + c];
    }

    function play(col) {
      if (gameOver) return;
      const row = getLowestEmptyRow(col);
      if (row === -1) return;

      board[row][col] = currentPlayer;

      const cell = getCell(row, col);
      cell.classList.add(colorClass(currentPlayer), 'drop');

      const winCells = checkWin(row, col);
      if (winCells) {
        gameOver = true;
        winCells.forEach(([r, c]) => getCell(r, c).classList.add('win'));
        scores[currentPlayer]++;
        document.getElementById('score1').textContent = scores[1];
        document.getElementById('score2').textContent = scores[2];
        statusEl.innerHTML = `<span class="dot ${colorClass(currentPlayer)}"></span> ${playerName(currentPlayer)} a gagné !`;
        return;
      }

      if (isDraw()) {
        gameOver = true;
        statusEl.textContent = 'Match nul !';
        return;
      }

      currentPlayer = currentPlayer === P1 ? P2 : P1;
      updateStatus();
    }

    function getLowestEmptyRow(col) {
      for (let r = ROWS - 1; r >= 0; r--) {
        if (board[r][col] === EMPTY) return r;
      }
      return -1;
    }

    function checkWin(row, col) {
      const directions = [
        [0, 1],   // horizontal
        [1, 0],   // vertical
        [1, 1],   // diag ↘
        [1, -1],  // diag ↙
      ];
      const player = board[row][col];

      for (const [dr, dc] of directions) {
        let cells = [[row, col]];
        for (const sign of [1, -1]) {
          let r = row + dr * sign;
          let c = col + dc * sign;
          while (r >= 0 && r < ROWS && c >= 0 && c < COLS && board[r][c] === player) {
            cells.push([r, c]);
            r += dr * sign;
            c += dc * sign;
          }
        }
        if (cells.length >= 4) return cells;
      }
      return null;
    }

    function isDraw() {
      return board[0].every(cell => cell !== EMPTY);
    }

    restartBtn.addEventListener('click', init);
    init();
  </script>
</body>
</html>
